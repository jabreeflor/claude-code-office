<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
    }

    h1 {
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #FFD700;
      margin-bottom: 12px;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .gba-frame {
      background: #2d2d4e;
      border: 4px solid #4a4a7a;
      border-radius: 12px;
      padding: 16px;
      box-shadow:
        0 0 20px rgba(90, 90, 180, 0.3),
        inset 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .screen-bezel {
      background: #111;
      border: 2px solid #333;
      border-radius: 4px;
      padding: 4px;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .controls {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      background: #4a4a7a;
      color: #FFD700;
      border: 2px solid #6a6aaa;
      border-radius: 20px;
      padding: 6px 16px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    button:hover {
      background: #5a5a9a;
      box-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
    }

    .status-text {
      font-size: 10px;
      color: #888;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Claude Code Office</h1>
  <div class="gba-frame">
    <div class="screen-bezel">
      <canvas id="screen" width="720" height="480"></canvas>
    </div>
  </div>
  <div class="controls">
    <button id="demo-btn">Demo Mode</button>
  </div>
  <div class="status-text">Watching Claude Code activity...</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
